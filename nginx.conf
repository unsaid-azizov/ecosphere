# HTTP: редиректим на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ecosphere.spb.ru www.ecosphere.spb.ru;
    return 301 https://$host$request_uri;
}

# HTTPS: основное проксирование
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ecosphere.spb.ru www.ecosphere.spb.ru;

    # Сертификаты от certbot
    ssl_certificate     /etc/letsencrypt/live/ecosphere.spb.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecosphere.spb.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Базовые заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

        # Отдаём статические файлы uploads напрямую (root вариант)
    location ^~ /uploads/ {
        root /home/ecosphere/ecosphere/public;
        # request /uploads/products/x.jpg -> /home/ecosphere/ecosphere/public/uploads/products/x.jpg
        access_log off;
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }
    
    # Прокси к приложению (поменяй порт при необходимости)
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Вебсокеты
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Таймауты
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}