services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecosphere
      POSTGRES_USER: ecosphere_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecopassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /root/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosphere_user -d ecosphere"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/unsaid-azizov/ecosphere:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ecosphere_user:${DB_PASSWORD:-ecopassword}@db:5432/ecosphere
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://ecosphere.spb.ru}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://ecosphere.spb.ru}
      NODE_ENV: production
    expose:
      - "3000"
    volumes:
      - uploads:/app/public/uploads

volumes:
  pgdata:
  uploads:
